<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>教練管理系統</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --surface3: #e8e4de;
    --border: #ddd9d2;
    --accent: #2d4a3e;
    --accent2: #7a9e8e;
    --text: #1a1a18;
    --text2: #7a7670;
    --text3: #b5b0a8;
    --danger: #c0392b;
    --warning: #b8860b;
    --tag-bg: #e8e4de;
    --bottom-nav-h: 64px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; font-size:14px; -webkit-font-smoothing:antialiased; }
  .app { display:flex; flex-direction:column; min-height:100vh; }

  /* ── Header ── */
  header { padding:14px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; background:var(--surface); position:sticky; top:0; z-index:100; }
  .logo { font-size:15px; font-weight:600; letter-spacing:-0.01em; color:var(--text); }
  .logo span { color:var(--accent2); }
  nav.top-nav { display:flex; gap:2px; }
  nav.top-nav button { background:none; border:none; color:var(--text2); padding:7px 14px; border-radius:6px; cursor:pointer; font-size:13px; font-family:inherit; font-weight:500; transition:color 0.15s, background 0.15s; }
  nav.top-nav button:hover { color:var(--text); background:var(--surface2); }
  nav.top-nav button.active { color:var(--accent); background:rgba(45,74,62,0.08); }

  /* ── Bottom Nav (mobile) ── */
  nav.bottom-nav { display:none; }

  /* ── 漢堡選單按鈕（預設隱藏，手機才顯示） ── */
  .hamburger-btn {
    display:none; background:none; border:none; cursor:pointer;
    font-size:22px; color:var(--text2); padding:6px 8px; border-radius:7px;
    line-height:1; -webkit-tap-highlight-color:transparent; transition:all 0.15s;
  }
  .hamburger-btn:hover { color:var(--text); background:var(--surface2); }

  /* ── 手機側邊選單 ── */
  .mobile-menu {
    display:none; position:fixed; inset:0; z-index:300;
  }
  .mobile-menu.open { display:block; }
  .mobile-menu-backdrop {
    position:absolute; inset:0;
    background:rgba(26,26,24,0.45);
  }
  .mobile-menu-panel {
    position:absolute; top:0; right:0; bottom:0; width:210px;
    background:var(--surface); border-left:1px solid var(--border);
    display:flex; flex-direction:column;
    padding-top:max(56px, calc(44px + env(safe-area-inset-top)));
    padding-bottom:max(24px, env(safe-area-inset-bottom));
    box-shadow:-8px 0 32px rgba(0,0,0,0.14);
    transform:translateX(100%); transition:transform 0.26s cubic-bezier(0.32,0.72,0,1);
  }
  .mobile-menu.open .mobile-menu-panel { transform:translateX(0); }
  .mobile-menu-item {
    background:none; border:none; cursor:pointer; font-family:inherit;
    display:flex; align-items:center; gap:12px; padding:14px 22px;
    color:var(--text2); font-size:14px; font-weight:500;
    transition:all 0.15s; text-align:left; width:100%;
    -webkit-tap-highlight-color:transparent;
  }
  .mobile-menu-item:hover { background:var(--surface2); color:var(--text); }
  .mobile-menu-item.active { color:var(--accent); background:rgba(45,74,62,0.07); font-weight:600; }
  .mobile-menu-item .menu-icon { font-size:18px; width:24px; text-align:center; }
  .mobile-menu-divider { border:none; border-top:1px solid var(--border); margin:8px 0; }

  @media(max-width:600px) {
    nav.top-nav { display:none; }
    .hamburger-btn { display:flex; align-items:center; justify-content:center; }
  }

  .main { flex:1; padding:24px 20px; max-width:860px; margin:0 auto; width:100%; }
  .view { display:none; }
  .view.active { display:block; }

  .section-title { font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--text3); margin-bottom:16px; }

  /* ── Today Strip ── */
  .today-strip {
    background:rgba(45,74,62,0.05); border:1px solid rgba(45,74,62,0.12);
    border-radius:10px; padding:12px 16px; margin-bottom:12px;
    display:flex; align-items:center; gap:16px; flex-wrap:wrap;
  }
  .today-strip-title { font-size:12px; font-weight:600; color:var(--accent); }
  .today-strip-stats { display:flex; gap:12px; flex-wrap:wrap; }
  .today-strip-stat { font-size:12px; color:var(--text2); }
  .today-strip-stat strong { color:var(--text); font-weight:600; }

  /* ── Student grid ── */
  .student-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:10px; }
  .student-card {
    background:var(--surface); border:1px solid var(--border); border-radius:10px;
    padding:16px; cursor:pointer; transition:border-color 0.15s, box-shadow 0.15s, transform 0.15s;
  }
  .student-card:hover {
    border-color:var(--accent2);
    box-shadow:0 4px 18px rgba(0,0,0,0.09);
    transform:translateY(-2px);
  }
  .student-card:active { transform:translateY(0); }
  .student-card.warning { border-left:3px solid var(--warning); }
  .student-card.danger { border-left:3px solid var(--danger); }
  .student-name { font-size:15px; font-weight:600; margin-bottom:8px; letter-spacing:-0.01em; }
  .student-meta { display:flex; gap:6px; flex-wrap:wrap; }
  .student-next-lesson { margin-top:10px; font-size:11px; color:var(--text2); display:flex; align-items:center; gap:4px; }
  .student-next-lesson .next-icon { color:var(--accent2); font-size:10px; }

  /* ── Badges ── */
  .badge { font-size:11px; padding:2px 8px; border-radius:4px; background:var(--surface2); color:var(--text2); font-family:'DM Mono',monospace; font-weight:400; }
  .badge.accent { background:rgba(45,74,62,0.08); color:var(--accent); }
  .badge.warning { background:rgba(184,134,11,0.1); color:var(--warning); }
  .badge.danger { background:rgba(192,57,43,0.08); color:var(--danger); }
  .badge.teal { background:rgba(122,158,142,0.12); color:var(--accent2); }

  /* ── Forms ── */
  .form-group { margin-bottom:16px; }
  .form-group label { display:block; font-size:10px; font-weight:600; color:var(--text3); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.08em; }
  .form-group input, .form-group textarea, .form-group select { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:7px; padding:10px 12px; color:var(--text); font-family:inherit; font-size:14px; outline:none; transition:border-color 0.15s; }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color:var(--accent2); background:var(--surface); }
  .form-group textarea { resize:vertical; min-height:60px; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

  /* ── Buttons ── */
  .btn { padding:10px 20px; border-radius:7px; border:none; cursor:pointer; font-family:inherit; font-size:13px; font-weight:500; transition:all 0.15s; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { background:#1e3329; }
  .btn-secondary { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
  .btn-secondary:hover { border-color:var(--text3); }
  .btn-danger { background:rgba(192,57,43,0.08); color:var(--danger); border:1px solid rgba(192,57,43,0.2); }
  .btn-danger:hover { background:rgba(192,57,43,0.14); }
  .btn-sm { padding:6px 12px; font-size:12px; }
  .btn-xs { padding:3px 8px; font-size:11px; }
  .btn-group { display:flex; gap:8px; flex-wrap:wrap; }
  @media(max-width:600px) {
    .btn-xs, .btn-sm { min-height:36px; }
  }

  /* ── Modal animations ── */
  .modal-overlay {
    display:flex; position:fixed; inset:0;
    background:rgba(26,26,24,0);
    z-index:200; align-items:flex-end; justify-content:center; padding:0;
    pointer-events:none; transition:background 0.2s ease;
  }
  .modal-overlay.open {
    background:rgba(26,26,24,0.45);
    pointer-events:all;
  }
  .modal {
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px 16px 0 0; padding:24px 24px;
    padding-bottom: max(36px, env(safe-area-inset-bottom));
    width:100%; max-width:540px; max-height:92vh; overflow-y:auto;
    box-shadow:0 -4px 24px rgba(0,0,0,0.1);
    transform:translateY(32px); opacity:0;
    transition:transform 0.22s cubic-bezier(0.32,0.72,0,1), opacity 0.18s ease;
    will-change:transform;
  }
  .modal-overlay.open .modal { transform:translateY(0); opacity:1; }
  .modal-title { font-size:14px; font-weight:600; letter-spacing:-0.01em; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; }
  .name-edit-input { background:none; border:none; border-bottom:1.5px solid transparent; font-size:14px; font-weight:600; font-family:inherit; color:var(--text); outline:none; min-width:80px; max-width:200px; padding:2px 0; transition:border-color 0.15s; }
  .name-edit-input:hover { border-bottom-color:var(--border); }
  .name-edit-input:focus { border-bottom-color:var(--accent2); }
  .modal-close { background:none; border:none; color:var(--text3); cursor:pointer; font-size:20px; line-height:1; width:28px; height:28px; border-radius:50%; background:var(--surface2); display:flex; align-items:center; justify-content:center; }
  .modal-close:hover { color:var(--text); }

  /* ── Schedule ── */
  .week-nav { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
  .week-title { font-size:13px; font-weight:500; flex:1; text-align:center; color:var(--text2); }
  .back-today-btn { font-size:11px; font-weight:600; color:var(--accent2); background:rgba(122,158,142,0.1); border:1px solid rgba(122,158,142,0.25); border-radius:5px; padding:3px 10px; cursor:pointer; font-family:inherit; white-space:nowrap; }
  .back-today-btn:hover { background:rgba(122,158,142,0.2); }

  .day-list { display:flex; flex-direction:column; gap:8px; }
  .day-block { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
  .day-block.today-block { border-color:rgba(45,74,62,0.25); box-shadow:0 0 0 1px rgba(45,74,62,0.08); }
  .day-header { padding:9px 14px; background:var(--surface); font-size:11px; font-weight:600; color:var(--text3); letter-spacing:0.06em; text-transform:uppercase; display:flex; justify-content:space-between; align-items:center; cursor:pointer; transition:background 0.15s; }
  .day-header:hover { background:var(--surface2); }
  .day-header.today {
    color:var(--accent);
    background:linear-gradient(90deg, rgba(45,74,62,0.06) 0%, rgba(45,74,62,0.01) 100%);
    border-left:3px solid var(--accent);
  }

  /* "即將上課" pulse dot */
  @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.4)} }
  .soon-dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--accent2); animation:pulse-dot 1.4s ease-in-out infinite; margin-right:4px; vertical-align:middle; }

  .schedule-slot { padding:10px 14px; border-top:1px solid var(--border); display:flex; align-items:center; gap:10px; cursor:pointer; transition:background 0.12s; }
  .schedule-slot:hover { background:var(--surface2); }
  .schedule-slot.recorded { border-left:3px solid var(--accent2); }
  .schedule-slot.has-plan:not(.recorded) { border-left:3px solid rgba(122,158,142,0.3); }
  .slot-time { font-family:'DM Mono',monospace; font-size:11px; color:var(--text3); min-width:44px; }
  .slot-name { font-weight:500; font-size:13px; flex:1; }
  .slot-status { font-size:11px; color:var(--text3); }
  .empty-day { padding:12px 14px; color:var(--text3); font-size:12px; font-style:italic; }

  /* ── Check-in ── */
  .checkin-btn {
    padding:4px 10px; border-radius:5px; border:1px solid var(--border);
    background:none; color:var(--text3); font-size:11px; font-family:inherit;
    cursor:pointer; transition:all 0.15s; white-space:nowrap;
    min-height:30px;
  }
  @media(max-width:600px){ .checkin-btn { min-height:36px; padding:6px 10px; } }
  .checkin-btn:hover { border-color:var(--accent2); color:var(--accent); }
  .checkin-btn.checked { background:rgba(45,74,62,0.08); border-color:var(--accent2); color:var(--accent); }

  /* ── QR ── */
  .qr-wrap { display:flex; flex-direction:column; align-items:center; gap:16px; padding:8px 0; }
  .qr-box { background:#fff; border-radius:10px; padding:14px; border:1px solid var(--border); }
  .checkin-log { display:flex; flex-direction:column; gap:6px; }
  .checkin-entry { display:flex; justify-content:space-between; align-items:center; padding:8px 12px; background:var(--surface2); border-radius:7px; font-size:13px; }
  .checkin-time { font-family:'DM Mono',monospace; font-size:11px; color:var(--text2); }

  /* ── Category manager ── */
  .cat-row { display:flex; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); gap:10px; }
  .cat-row:last-child { border-bottom:none; }
  .cat-name-input { flex:1; background:none; border:none; color:var(--text); font-family:inherit; font-size:13px; padding:2px 0; outline:none; }
  .cat-name-input:focus { color:var(--accent); }
  .color-swatch { width:14px; height:14px; border-radius:50%; border:2px solid transparent; cursor:pointer; flex-shrink:0; }
  .color-swatch.selected { border-color:var(--text); }
  .color-picker-row { display:flex; gap:8px; flex-wrap:wrap; }

  /* ── Stats ── */
  .detail-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
  .stat-box { background:var(--surface2); border-radius:8px; padding:12px; text-align:center; }
  .stat-value { font-size:19px; font-weight:600; font-family:'DM Mono',monospace; color:var(--accent); }
  .stat-label { font-size:10px; color:var(--text3); margin-top:2px; text-transform:uppercase; letter-spacing:0.05em; }

  .lesson-list { display:flex; flex-direction:column; gap:6px; }
  .lesson-item { background:var(--surface2); border-radius:8px; padding:12px; }
  .lesson-date { font-size:10px; color:var(--text3); font-family:'DM Mono',monospace; margin-bottom:6px; letter-spacing:0.04em; }

  /* ── Builder ── */
  .builder-block { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 14px; margin-bottom:8px; }
  .builder-block-header { display:flex; align-items:center; gap:6px; margin-bottom:10px; padding-bottom:10px; border-bottom:1px solid var(--border); }
  .cat-tags { display:flex; gap:5px; flex-wrap:wrap; flex:1; }
  .cat-tag-btn { font-size:11px; font-weight:600; padding:4px 11px; border-radius:20px; border:none; cursor:pointer; font-family:inherit; opacity:0.45; background:var(--surface2); color:var(--text2); transition:opacity 0.15s; }
  .cat-tag-btn.active { opacity:1; }
  .remove-block { margin-left:auto; background:none; border:none; color:var(--text3); cursor:pointer; font-size:18px; line-height:1; padding:2px 4px; border-radius:4px; flex-shrink:0; }
  .remove-block:hover { color:var(--danger); }
  .exercise-name-wrap { position:relative; margin-bottom:10px; }
  .exercise-name-wrap input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:8px 36px 8px 12px; color:var(--text); font-family:inherit; font-size:14px; font-weight:600; outline:none; }
  .exercise-name-wrap input:focus { border-color:var(--accent2); background:var(--surface); }
  .exercise-name-wrap input::placeholder { color:var(--text3); font-weight:400; font-size:13px; }
  .exercise-dropdown-btn { position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text3); cursor:pointer; font-size:13px; padding:2px; }
  .exercise-history-list { position:absolute; top:100%; left:0; right:0; background:var(--surface); border:1px solid var(--border); border-radius:8px; z-index:300; max-height:160px; overflow-y:auto; margin-top:2px; display:none; box-shadow:0 4px 20px rgba(0,0,0,0.1); }
  .exercise-history-list.open { display:block; }
  .exercise-history-item { padding:8px 12px; cursor:pointer; font-size:13px; transition:background 0.1s; }
  .exercise-history-item:hover { background:var(--surface2); color:var(--accent); }
  .exercise-history-empty { padding:10px; font-size:12px; color:var(--text3); text-align:center; }
  .sets-container { display:flex; flex-direction:column; gap:5px; margin-bottom:6px; }
  .set-row { display:grid; grid-template-columns:18px repeat(3,1fr) 24px; gap:6px; align-items:center; }
  .set-num { font-size:11px; color:var(--text3); font-family:'DM Mono',monospace; text-align:center; }
  .set-cell { display:flex; align-items:center; background:var(--surface2); border:1px solid var(--border); border-radius:6px; overflow:hidden; }
  .set-cell:focus-within { border-color:var(--accent2); }
  .set-input { flex:1; background:transparent; border:none; padding:0 4px; color:var(--text); font-family:'DM Mono',monospace; font-size:13px; outline:none; text-align:center; width:100%; height:30px; min-width:0; }
  .set-unit { font-size:10px; color:var(--text3); padding:0 5px; font-family:'DM Mono',monospace; white-space:nowrap; border-left:1px solid var(--border); background:var(--surface3); align-self:stretch; display:flex; align-items:center; }
  .remove-set { background:none; border:none; color:var(--text3); cursor:pointer; font-size:14px; padding:0 2px; }
  .remove-set:hover { color:var(--danger); }
  .add-set-btn { background:none; border:1px dashed var(--border); color:var(--text3); border-radius:6px; padding:5px 8px; font-size:11px; font-family:inherit; cursor:pointer; width:100%; margin-bottom:4px; text-align:center; transition:all 0.15s; }
  .add-set-btn:hover { border-color:var(--accent2); color:var(--accent); }
  .add-note-btn { background:none; border:none; color:var(--text3); padding:2px 4px; font-size:11px; font-family:inherit; cursor:pointer; display:block; margin-top:2px; }
  .add-note-btn:hover { color:var(--accent2); }
  .exercise-note-input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:6px 10px; color:var(--text2); font-family:inherit; font-size:12px; outline:none; margin-top:6px; }
  .exercise-note-input:focus { border-color:var(--accent2); }
  .exercise-note-input::placeholder { color:var(--text3); }
  textarea.exercise-note-input { resize:vertical; min-height:60px; line-height:1.5; }
  .add-block-btn { width:100%; background:none; border:2px dashed var(--border); color:var(--text3); border-radius:8px; padding:10px; cursor:pointer; font-family:inherit; font-size:13px; margin-bottom:10px; transition:all 0.15s; }
  .add-block-btn:hover { border-color:var(--accent2); color:var(--accent); }

  /* ── Exercise display ── */
  .blocks-wrap { background:var(--surface2); border-radius:7px; padding:6px 10px; }
  .exercise-display { display:flex; align-items:baseline; gap:6px; padding:3px 0; border-bottom:1px solid var(--border); line-height:1.4; }
  .exercise-display:last-child { border-bottom:none; }
  .exercise-display-name { font-weight:600; font-size:12px; flex-shrink:0; color:var(--text); }
  .sets-chips { display:flex; flex-wrap:wrap; gap:3px; flex:1; align-items:baseline; }
  .set-chip { font-family:'DM Mono',monospace; font-size:11px; color:var(--text2); }
  .set-chip + .set-chip::before { content:'·'; color:var(--text3); margin-right:2px; }
  .exercise-note-display { font-size:10px; color:var(--text3); font-style:italic; }
  .notes-display { font-size:11px; color:var(--text3); font-style:italic; padding:3px 0; }

  /* ── Past Training Reference Panel ── */
  .past-ref-panel { border:1px solid var(--border); border-radius:8px; margin-bottom:14px; overflow:hidden; }
  .past-ref-toggle { width:100%; background:var(--surface2); border:none; padding:9px 14px; display:flex; align-items:center; gap:6px; cursor:pointer; font-family:inherit; font-size:12px; color:var(--accent); font-weight:600; }
  .past-ref-toggle:hover { background:var(--surface3); }
  .past-ref-toggle-arrow { margin-left:auto; font-size:11px; color:var(--text3); }
  .past-ref-body { display:none; background:var(--surface); border-top:1px solid var(--border); max-height:300px; overflow-y:auto; }
  .past-ref-body.open { display:block; }
  /* 每一筆課程 */
  .past-ref-session { border-bottom:1px solid var(--border); }
  .past-ref-session:last-child { border-bottom:none; }
  .past-ref-session-header { padding:8px 14px; display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none; background:var(--surface); }
  .past-ref-session-header:hover { background:var(--surface2); }
  .past-ref-session-date { font-family:'DM Mono',monospace; font-size:11px; font-weight:600; color:var(--text); min-width:84px; }
  .past-ref-session-meta { font-size:11px; color:var(--text3); }
  .past-ref-session-actions { margin-left:auto; display:flex; align-items:center; gap:6px; }

  .past-ref-blocks { display:none; padding:6px 14px 10px; background:var(--surface2); border-top:1px solid var(--border); }

  .past-ref-block { display:flex; align-items:center; gap:8px; padding:5px 0; border-bottom:1px solid var(--border); }
  .past-ref-block:last-child { border-bottom:none; }
  .past-ref-block-name { font-size:12px; font-weight:600; color:var(--text); min-width:0; flex:1; }
  .past-ref-block-sets { font-size:11px; color:var(--text3); font-family:'DM Mono',monospace; margin-right:auto; }
  .past-ref-copy-btn { background:none; border:1px solid var(--border); border-radius:4px; color:var(--text2); font-size:10px; padding:2px 7px; cursor:pointer; white-space:nowrap; font-family:inherit; flex-shrink:0; }
  .past-ref-copy-btn:hover { border-color:var(--accent2); color:var(--accent); background:rgba(45,74,62,0.06); }

  /* ── Payments ── */
  .payment-item { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); font-size:13px; }
  .payment-item:last-child { border-bottom:none; }
  .payment-amount { font-family:'DM Mono',monospace; color:var(--accent); font-weight:500; }
  .payment-date { color:var(--text3); font-size:11px; }
  .per-session { font-size:11px; color:var(--text3); margin-top:2px; }

  /* ── YTD strip ── */
  .ytd-strip { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
  .ytd-box { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px; text-align:center; }
  .ytd-val { font-size:17px; font-weight:600; font-family:'DM Mono',monospace; color:var(--accent); }
  .ytd-label { font-size:10px; color:var(--text3); margin-top:2px; text-transform:uppercase; letter-spacing:0.05em; }

  /* ── Bar chart ── */
  .chart-wrap { margin-bottom:16px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 16px; }
  .chart-label { font-size:10px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:10px; }
  #revenue-chart { width:100%; display:block; cursor:pointer; }

  /* ── Monthly ── */
  .month-tabs { display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; }
  .month-tab { padding:5px 12px; border-radius:4px; border:1px solid var(--border); background:none; color:var(--text2); cursor:pointer; font-family:inherit; font-size:12px; }
  .month-tab:hover { color:var(--text); border-color:var(--text3); }
  .month-tab.active { background:var(--accent); border-color:var(--accent); color:#fff; }
  .monthly-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
  .monthly-breakdown { display:flex; flex-direction:column; gap:0; margin-bottom:16px; }
  .breakdown-row { display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid var(--border); font-size:13px; }
  .breakdown-row:last-child { border-bottom:none; }
  .breakdown-val { font-family:'DM Mono',monospace; color:var(--accent); font-weight:500; }

  /* ── Expense ── */
  .expense-item { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); font-size:13px; }
  .expense-item:last-child { border-bottom:none; }
  .expense-amount { font-family:'DM Mono',monospace; color:var(--danger); font-weight:500; }
  .expense-cat { font-size:10px; padding:2px 7px; border-radius:4px; background:rgba(192,57,43,0.07); color:var(--danger); font-weight:600; }
  .net-profit-row { display:flex; justify-content:space-between; align-items:center; padding:10px 12px; border-radius:8px; margin-top:8px; }
  .net-profit-row.positive { background:rgba(45,74,62,0.06); }
  .net-profit-row.negative { background:rgba(192,57,43,0.06); }
  .net-profit-label { font-size:12px; font-weight:600; color:var(--text2); }
  .net-profit-val { font-family:'DM Mono',monospace; font-size:15px; font-weight:600; }

  .divider { border:none; border-top:1px solid var(--border); margin:16px 0; }

  .search-bar input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:9px 16px 9px 34px; color:var(--text); font-family:inherit; font-size:13px; outline:none; }
  .search-bar input:focus { border-color:var(--accent2); }
  .search-icon { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--text3); font-size:13px; }

  /* ── FAB ── */
  .fab {
    position:fixed; bottom:28px; right:24px; width:50px; height:50px;
    border-radius:50%; background:var(--accent); color:#fff; border:none;
    font-size:22px; cursor:pointer; display:flex; align-items:center; justify-content:center;

  .fab:active { transform:scale(0.95); }

  .no-data { text-align:center; padding:48px 20px; color:var(--text3); }
  .no-data .icon { font-size:32px; margin-bottom:10px; }
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  /* ════════════════════════════════
     響應式斷點系統
     sm  ≤ 480px   (手機直式)
     md  ≤ 600px   (手機橫式 / 小平板)
     lg  ≥ 900px   (桌機)
  ════════════════════════════════ */

  /* ── 桌機加寬 ── */
  @media(min-width:900px) {
    .main { max-width:960px; padding:32px 40px; }
    header { padding:16px 40px; }
    .student-grid { grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:12px; }
    .day-list { gap:10px; }
    .schedule-slot { padding:12px 18px; }
    .modal { border-radius:16px; margin-bottom:40px; }
  }

  /* ── 平板 (601–899px) ── */
  @media(min-width:601px) and (max-width:899px) {
    .main { padding:20px 24px; }
    .student-grid { grid-template-columns:repeat(2,1fr); }
    .monthly-grid { grid-template-columns:repeat(3,1fr); }
  }

  /* ── 手機 ≤ 600px ── */
  @media(max-width:600px) {
    .form-row { grid-template-columns:1fr; }
    .btn-xs, .btn-sm { min-height:36px; }
    .checkin-btn { min-height:36px; padding:6px 8px; }
    .main { padding:16px 14px; }
    header { padding:10px 16px; }
    .logo { font-size:14px; }
    .week-title { font-size:12px; }
    .back-today-btn { font-size:10px; padding:3px 8px; }

    .month-tabs::-webkit-scrollbar { display:none; }

    /* 收入頁 section title 按鈕 */
    .section-title { align-items:flex-start !important; }
  }

  /* ── 手機小 ≤ 480px ── */
  @media(max-width:480px) {
    .main { padding:12px 10px; }
    /* 課表 slot：隱藏狀態文字，按鈕變緊湊 */
    .slot-status { display:none; }
    .schedule-slot { padding:9px 10px; gap:5px; }
    .slot-time { min-width:36px; font-size:10px; }
    .slot-name { font-size:12px; }
    .checkin-btn { padding:4px 6px; font-size:10px; min-height:32px; }
    /* stats 格子 3→2 欄 */
    .ytd-strip { grid-template-columns:1fr 1fr; }
    .monthly-grid { grid-template-columns:1fr 1fr; }
    .ytd-val { font-size:15px; }
    .stat-value { font-size:16px; }
    /* breakdown row 垂直排列 */
    .breakdown-row { flex-direction:column; align-items:flex-start; gap:3px; padding:8px 0; }
    .breakdown-row > span:last-child { width:100%; justify-content:flex-start !important; gap:10px !important; }
    /* week nav */
    .week-nav .btn-sm { padding:5px 8px; font-size:11px; }
    /* section 標題 */
    .section-title { font-size:10px; }
    /* today strip 緊縮 */
    .today-strip-stat { font-size:11px; }
  }

  /* ── 超小手機 ≤ 360px ── */
  @media(max-width:360px) {
    .detail-stats { grid-template-columns:1fr 1fr; }
    .ytd-strip { grid-template-columns:1fr 1fr; }
    .badge { font-size:10px; padding:2px 6px; }
    .student-name { font-size:14px; }
    .modal { padding:20px 16px; padding-bottom:max(28px,env(safe-area-inset-bottom)); }
    .set-row { grid-template-columns:12px 1fr 1fr 1fr auto; }
  }

  /* ── 載入中畫面 ── */
  .app-loading {
    position:fixed; inset:0; background:var(--bg); z-index:1000;
    display:flex; align-items:center; justify-content:center; flex-direction:column; gap:16px;
  }
  .spinner {
    width:36px; height:36px; border:3px solid var(--border);
    border-top-color:var(--accent); border-radius:50%;
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ── 登入畫面 ── */
  .login-screen {
    position:fixed; inset:0; background:var(--bg); z-index:999;
    display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .login-card {
    background:var(--surface); border:1px solid var(--border); border-radius:20px;
    padding:44px 32px; max-width:340px; width:100%; text-align:center;
    box-shadow:0 8px 40px rgba(0,0,0,0.07);
  }
  .login-logo { font-size:28px; font-weight:700; letter-spacing:-0.02em; margin-bottom:8px; }
  .login-logo span { color:var(--accent2); }
  .login-subtitle { font-size:13px; color:var(--text2); margin-bottom:36px; line-height:1.7; }
  .google-btn {
    display:flex; align-items:center; justify-content:center; gap:10px;
    width:100%; padding:13px 20px; border-radius:9px;
    background:#fff; border:1px solid var(--border); cursor:pointer;
    font-family:inherit; font-size:14px; font-weight:500; color:#3c4043;
    transition:all 0.15s; box-shadow:0 1px 4px rgba(0,0,0,0.07);
  }
  .google-btn:hover { box-shadow:0 3px 12px rgba(0,0,0,0.13); border-color:var(--text3); }
  .login-note { margin-top:20px; font-size:11px; color:var(--text3); line-height:1.7; }

  /* ── Header 使用者資訊 ── */
  .header-right { display:flex; align-items:center; gap:8px; }
  .user-chip {
    display:none; align-items:center; gap:6px;
    background:var(--surface2); border:1px solid var(--border);
    border-radius:20px; padding:3px 10px 3px 4px;
  }
  .user-chip.visible { display:flex; }
  .user-avatar { width:24px; height:24px; border-radius:50%; object-fit:cover; background:var(--border); }
  .user-dname { font-size:12px; font-weight:500; color:var(--text2); max-width:90px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  @media(max-width:600px) { .user-dname { display:none; } .user-chip { padding:3px 6px 3px 4px; } }

  /* ── Desktop logout btn ── */
  .logout-btn-desktop {
    display:none; background:none; border:1px solid var(--border); border-radius:7px;
    color:var(--danger); font-size:12px; font-weight:500; padding:5px 10px;
    cursor:pointer; font-family:inherit; transition:all 0.15s; white-space:nowrap;
  }
  .logout-btn-desktop:hover { background:rgba(192,57,43,0.07); border-color:var(--danger); }
  @media(min-width:601px) { .logout-btn-desktop { display:inline-flex; align-items:center; gap:5px; } }

  /* ── Measurements ── */
  .measure-table { width:100%; border-collapse:collapse; font-size:12px; margin-bottom:8px; }
  .measure-table th { text-align:left; color:var(--text3); font-weight:600; font-size:10px; text-transform:uppercase; letter-spacing:0.06em; padding:4px 6px 6px; border-bottom:1px solid var(--border); }
  .measure-table td { padding:8px 6px; border-bottom:1px solid var(--border); color:var(--text); vertical-align:middle; }
  .measure-table tr:last-child td { border-bottom:none; }
  .measure-table td:first-child { font-family:'DM Mono',monospace; font-size:11px; color:var(--text3); white-space:nowrap; }
  .measure-val { font-family:'DM Mono',monospace; font-weight:500; color:var(--accent); }
  .measure-delta { font-size:10px; margin-left:4px; }
  .measure-delta.up { color:var(--danger); }
  .measure-delta.down { color:var(--accent2); }
  .measure-note-cell { font-size:11px; color:var(--text2); font-style:italic; max-width:80px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .measure-del-btn { background:none; border:none; color:var(--text3); cursor:pointer; font-size:13px; padding:0 4px; }
  .measure-del-btn:hover { color:var(--danger); }

  /* ── Training History View ── */
  .history-filter-bar { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
  .history-filter-bar select { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:6px 10px; color:var(--text); font-size:13px; font-family:inherit; outline:none; cursor:pointer; }
  .history-count { font-size:12px; color:var(--text3); margin-left:auto; }
  .history-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 16px; margin-bottom:10px; }
  .history-card-header { display:flex; align-items:center; gap:10px; margin-bottom:8px; flex-wrap:wrap; }
  .history-card-date { font-size:13px; font-weight:600; color:var(--text); }
  .history-card-student { font-size:12px; color:var(--accent); background:rgba(45,74,62,0.08); border-radius:5px; padding:2px 8px; font-weight:500; }
  .history-card-time { font-size:12px; color:var(--text3); }
  .history-card-notes { font-size:12px; color:var(--text2); margin-top:6px; font-style:italic; padding-top:6px; border-top:1px solid var(--border); }
  .no-history { text-align:center; padding:60px 20px; color:var(--text3); }
  .no-history .icon { font-size:40px; margin-bottom:12px; }
</style>

<!-- 最優先 script：不依賴 Firebase，確保頁面一定能顯示 -->
<script>
// 1. Loading 安全防護（Firebase 崩潰也能顯示登入畫面）
window._authSafetyTimer = setTimeout(function() {
  var l = document.getElementById('app-loading');
  var s = document.getElementById('login-screen');
  if(l) l.style.display = 'none';
  if(s) s.style.display = 'flex';
}, 8000);

// 2. 全局錯誤捕捉
window.onerror = function(msg, src, line, col, err) {
  var errEl = document.getElementById('login-error');
  if(errEl) {
    errEl.textContent = '系統錯誤（' + line + '行）：' + msg;
    errEl.style.display = 'block';
  }
};

// 3. signInWithGoogle — popup 優先（Google Cloud Console 已授權），被擋才用 redirect
var _googleBtnHTML = '<svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg> 使用 Google 帳號登入';

window.signInWithGoogle = function() {
  var errEl = document.getElementById('login-error');
  var btn   = document.querySelector('.google-btn');
  errEl.style.display = 'none';

  if(typeof firebase === 'undefined' || typeof window._firebaseAuth === 'undefined') {
    errEl.textContent = '❌ Firebase 未載入，請重新整理（Cmd+Shift+R）';
    errEl.style.display = 'block';
    return;
  }

  if(btn) { btn.textContent = '登入中...'; btn.disabled = true; }

  try {
    var provider = new firebase.auth.GoogleAuthProvider();
    window._firebaseAuth.signInWithPopup(provider)
      .then(function() { /* onAuthStateChanged 會處理 */ })
      .catch(function(err) {
        if(err.code === 'auth/popup-blocked' || err.code === 'auth/popup-closed-by-user') {
          // popup 被擋，改用 redirect
          window._firebaseAuth.signInWithRedirect(provider);
          return;
        }
        if(btn) { btn.innerHTML = _googleBtnHTML; btn.disabled = false; }
        errEl.textContent = '❌ ' + (err.message || err.code);
        errEl.style.display = 'block';
      });
  } catch(err) {
    if(btn) { btn.innerHTML = _googleBtnHTML; btn.disabled = false; }
    errEl.textContent = '❌ ' + err.message;
    errEl.style.display = 'block';
  }
};
</script>

<script>
// ── Firebase 初始化 ──
const firebaseConfig = {
  apiKey: "AIzaSyDn_uorFzZIRmiLLyEqWskn9N7OPuE0ECw",
  authDomain: "coaching-system-3779a.firebaseapp.com",
  projectId: "coaching-system-3779a",
  storageBucket: "coaching-system-3779a.firebasestorage.app",
  messagingSenderId: "429132571236",
  appId: "1:429132571236:web:7a67d906a4be4015b5f571"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
window._firebaseAuth = auth; // 供 signInWithGoogle（早期 script）使用

// ── Data ──
let data = {students:[], schedules:[], expenses:[]};
let currentUser = null;
let saveTimer = null;

function save() {
  if(!currentUser) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    db.collection('users').doc(currentUser.uid).set(data)
      .catch(e => console.error('儲存失敗:', e));
  }, 600);
}

async function loadUserData() {
  try {
    const snap = await db.collection('users').doc(currentUser.uid).get();
    if(snap.exists) {
      data = snap.data();
      if(!data.expenses)  data.expenses  = [];
      if(!data.students)  data.students  = [];
      if(!data.schedules) data.schedules = [];
    } else {
      data = {students:[], schedules:[], expenses:[]};
    }
  } catch(e) {
    console.error('載入資料失敗:', e);
    data = {students:[], schedules:[], expenses:[]};
  }
  initColorPicker();
  if(!handleHashCheckin()) showView('schedule');
}

// ── Google 登入 / 登出 ──
// signInWithGoogle 已定義於頁面頂部的早期 script，此處不重複定義

function signOutUser() {
  appConfirm('確定要登出嗎？', () => auth.signOut());
}

// ── Auth 狀態監聽 ──
auth.onAuthStateChanged(user => {
  clearTimeout(window._authSafetyTimer);
  const loadingEl  = document.getElementById('app-loading');
  const loginEl    = document.getElementById('login-screen');
  const appEl      = document.querySelector('.app');
  const userChip   = document.getElementById('user-chip');

  if(user) {
    currentUser = user;
    loadingEl.style.display  = 'none';
    loginEl.style.display    = 'none';
    appEl.style.display      = 'flex';
    document.getElementById('user-avatar').src = user.photoURL || '';
    document.getElementById('user-dname').textContent = user.displayName || user.email;
    userChip.classList.add('visible');
    document.getElementById('view-schedule').classList.add('active');
    try { renderSchedule(); } catch(e) {}
    loadUserData();
  } else {
    currentUser = null;
    data = {students:[], schedules:[], expenses:[]};
    loadingEl.style.display  = 'none';
    loginEl.style.display    = 'flex';
    appEl.style.display      = 'none';
    userChip.classList.remove('visible');
    // 還原登入按鈕
    var btn = document.querySelector('.google-btn');
    if(btn && btn.disabled) { btn.innerHTML = window._googleBtnHTML||'使用 Google 帳號登入'; btn.disabled = false; }
  }
});

// ── 防抖工具 ──
function debounce(fn, ms) {
  let t; return (...args) => { clearTimeout(t); t = setTimeout(()=>fn(...args), ms); };
}
const renderStudentsDebounced = debounce(() => renderStudents(), 120);

function genId() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function fmtDate(d) { return d.toISOString().slice(0,10); }

// ── Nav ──
let currentView = 'schedule';
function showView(v) {
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('nav.top-nav button').forEach((el,i)=>el.classList.toggle('active',['schedule','students','payments','history'][i]===v));
  // 手機側邊選單 active 狀態
  ['schedule','students','payments','history'].forEach(name=>{
    const btn=document.getElementById('mmenu-'+name);
    if(btn) btn.classList.toggle('active', name===v);
  });
  document.getElementById('view-'+v).classList.add('active');
  currentView=v;
  if(v==='schedule') renderSchedule();
  if(v==='students') renderStudents();
  if(v==='payments') renderPayments();
  if(v==='history') renderHistory();
  // Update FAB label
  const fab = document.getElementById('fab-btn');
  if(fab) fab.textContent = v==='students' ? '＋' : '＋';
}

  const menu = document.getElementById('mobile-menu');
  menu.classList.toggle('open');
}
function closeMobileMenu() {
  document.getElementById('mobile-menu').classList.remove('open');
}
// 按 ESC 關閉選單
document.addEventListener('keydown', e => { if(e.key==='Escape') closeMobileMenu(); });

function handleFab() {
  if(currentView==='students') openModal('modal-add-student');
  else if(currentView==='schedule') openAddScheduleModal();
  else if(currentView==='payments') openExpenseModal();
  else openModal('modal-add-student');
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// Per-session preview for new student
['new-student-sessions','new-student-amount'].forEach(id=>{
  document.getElementById(id).addEventListener('input',()=>{
    const s=parseInt(document.getElementById('new-student-sessions').value);
    const a=parseInt(document.getElementById('new-student-amount').value);
    document.getElementById('new-student-per-session').textContent = s&&a ? `平均每堂 $${Math.round(a/s).toLocaleString()} 元` : '';
  });
});

// ── Training Block Builder ──
const NOTES_CAT = {id:'notes', label:'備注', color:'teal'};
const CAT_COLORS = ['green','yellow','blue','purple','orange','pink','red','cyan'];
const CAT_COLOR_MAP = {
  green:  {tag:'rgba(200,245,90,0.2)',  text:'#c8f55a'},
  yellow: {tag:'rgba(245,200,90,0.2)',  text:'#f5c85a'},
  blue:   {tag:'rgba(90,150,255,0.2)',  text:'#7ab0ff'},
  purple: {tag:'rgba(180,90,255,0.2)',  text:'#c07aff'},
  orange: {tag:'rgba(255,160,60,0.2)',  text:'#ffa03c'},
  pink:   {tag:'rgba(255,90,180,0.2)',  text:'#ff7ac8'},
  red:    {tag:'rgba(245,90,90,0.2)',   text:'#f55a5a'},
  cyan:   {tag:'rgba(90,245,200,0.2)',  text:'#5af5c8'},
};
function getCategories() { return data.categories || []; }
function getCatStyle(color) { return CAT_COLOR_MAP[color] || CAT_COLOR_MAP['green']; }
function getCatById(id) {
  if(id==='notes') return NOTES_CAT;
  return getCategories().find(c=>c.id===id) || null;
}

function addBuilderBlock(containerId, block=null) {
  const container = document.getElementById(containerId);
  const id = 'blk_'+genId();
  const cats = getCategories();
  const type = block?.type || (cats[0]?.id || 'notes');
  const name = block?.name||'';
  const sets = block?.sets||[{sets:'',reps:'',weight:''}];
  const exerciseNote = block?.exerciseNote||'';
  const div = document.createElement('div');
  div.className='builder-block'; div.dataset.blockId=id;
  div.innerHTML=`
    <div class="builder-block-header">
      <div class="cat-tags" id="cattags_${id}">
        ${cats.map(c=>{
          const s = getCatStyle(c.color||'green');
          return `<button class="cat-tag-btn${c.id===type?' active':''}"
            style="${c.id===type?`background:${s.tag};color:${s.text}`:''}"
            data-catid="${c.id}" onclick="selectCatTag('${id}','${c.id}')">${c.label}</button>`;
        }).join('')}
      </div>
      <input type="hidden" id="type_${id}" value="${type}">
      <button class="remove-block" onclick="removeBuilderBlock('${id}')">×</button>
    </div>
    <div id="body_${id}">${buildBlockBody(id, type, name, sets, exerciseNote)}</div>`;
  container.appendChild(div);
}

function buildBlockBody(id, type, name='', sets=[{sets:'',reps:'',weight:''}], exerciseNote='') {
  if(type==='notes') {
    return `<textarea class="exercise-note-input" id="note_${id}" placeholder="備注內容..." rows="3">${exerciseNote}</textarea>`;
  }
  const setsHtml = sets.map((s,i)=>buildSetRow(id,i,s)).join('');
  return `
    <div class="exercise-name-wrap">
      <input id="name_${id}" placeholder="動作名稱（輸入或選擇歷史動作）" value="${name}"
        oninput="filterExerciseHistory('${id}')" onfocus="openExerciseHistory('${id}')" autocomplete="off">
      <button class="exercise-dropdown-btn" type="button" onclick="toggleExerciseHistory('${id}')">▾</button>
      <div class="exercise-history-list" id="hist_${id}"></div>
    </div>
    <div class="sets-container" id="sets_${id}">${setsHtml}</div>
    <button class="add-set-btn" onclick="addSetRow('${id}')">＋ 新增一組</button>
    <div id="notewrap_${id}" style="display:${exerciseNote?'block':'none'}">
      <input class="exercise-note-input" id="enote_${id}" placeholder="動作備注..." value="${exerciseNote}">
    </div>
    <button class="add-note-btn" onclick="toggleExerciseNote('${id}')">＋ 動作備注</button>`;
}

function buildSetRow(blockId, index, set={}) {
  const sid = 'set_'+blockId+'_'+index+'_'+Date.now();
  return `<div class="set-row" id="${sid}">
    <span class="set-num">${index+1}</span>
    <div class="set-cell"><input class="set-input" placeholder="組" value="${set.sets||''}" data-field="sets" inputmode="numeric" pattern="[0-9]*"><span class="set-unit">組</span></div>
    <div class="set-cell"><input class="set-input" placeholder="次" value="${set.reps||''}" data-field="reps" inputmode="numeric" pattern="[0-9]*"><span class="set-unit">次</span></div>
    <div class="set-cell"><input class="set-input" placeholder="0" value="${set.weight||''}" data-field="weight" inputmode="decimal" pattern="[0-9.]*"><span class="set-unit">kg</span></div>
    <button class="remove-set" onclick="this.closest('.set-row').remove();renumberSets('${blockId}')">×</button>
  </div>`;
}

function renumberSets(blockId) {
  document.getElementById('sets_'+blockId)?.querySelectorAll('.set-row').forEach((row,i)=>{
    row.querySelector('.set-num').textContent = i+1;
  });
}
function addSetRow(blockId) {
  const container = document.getElementById('sets_'+blockId); if(!container) return;
  container.insertAdjacentHTML('beforeend', buildSetRow(blockId, container.children.length));
}
function selectCatTag(blockId, catId) {
  document.getElementById('type_'+blockId).value = catId;
  const cats = getCategories();
  document.getElementById('cattags_'+blockId)?.querySelectorAll('.cat-tag-btn').forEach(btn=>{
    const isActive = btn.dataset.catid === catId;
    const cat = cats.find(c=>c.id===btn.dataset.catid);
    const s = getCatStyle(cat?.color||'cyan');

function toggleExerciseNote(blockId) {
  const wrap = document.getElementById('notewrap_'+blockId); if(!wrap) return;
  wrap.style.display = wrap.style.display==='none' ? 'block' : 'none';
  if(wrap.style.display!=='none') document.getElementById('enote_'+blockId)?.focus();
}
function removeBuilderBlock(id) { document.querySelector('[data-block-id="'+id+'"]')?.remove(); }

function getBuilderBlocks(cid) {
  const blocks=[];
  document.getElementById(cid).querySelectorAll('.builder-block').forEach(div=>{
    const id=div.dataset.blockId;
    const type=document.getElementById('type_'+id)?.value||'notes';
    if(type==='notes') {
      const note=(document.getElementById('note_'+id)?.value||'').trim();
      if(note) blocks.push({type,exerciseNote:note});
      return;
    }
    const name=(document.getElementById('name_'+id)?.value||'').trim();
    const exerciseNote=(document.getElementById('enote_'+id)?.value||'').trim();
    const sets=[];
    document.getElementById('sets_'+id)?.querySelectorAll('.set-row').forEach(row=>{
      const inputs=row.querySelectorAll('.set-input');
      const s={sets:inputs[0]?.value.trim(),reps:inputs[1]?.value.trim(),weight:inputs[2]?.value.trim()};
      if(s.sets||s.reps||s.weight) sets.push(s);
    });
    if(name||sets.length) blocks.push({type,name,sets,exerciseNote});
  });
  return blocks;
}
function clearBuilder(cid) { document.getElementById(cid).innerHTML=''; }

function renderBlocksDisplay(blocks) {
  if(!blocks||!blocks.length) return '<span style="color:var(--text3);font-size:12px">無訓練內容</span>';
  return '<div class="blocks-wrap">' + blocks.map(b=>{
    const cat = getCatById(b.type);
    const catStyle = cat ? getCatStyle(cat.color) : null;
    if(b.type==='notes') return `<div class="exercise-display notes-display">${(b.exerciseNote||'').replace(/\n/g,' ')}</div>`;
    const chipsHtml = (b.sets||[]).map(s=>{
      const parts=[];
      if(s.sets) parts.push(s.sets+'組');
      if(s.reps) parts.push(s.reps+'次');
      if(s.weight) parts.push(s.weight+'kg');
      return parts.length ? `<span class="set-chip">${parts.join('·')}</span>` : '';
    }).filter(Boolean).join('');
    const catDot = catStyle ? `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${catStyle.text};flex-shrink:0;margin-right:2px"></span>` : '';
    return `<div class="exercise-display">
      ${catDot}<span class="exercise-display-name">${b.name||'未命名'}</span>
      <div class="sets-chips">${chipsHtml}</div>
      ${b.exerciseNote?`<span class="exercise-note-display">${b.exerciseNote}</span>`:''}
    </div>`;
  }).join('') + '</div>';
}

// ── Exercise History ──
function getExerciseHistory(catId=null) {
  const counts = {};
  data.schedules.forEach(slot => {
    (slot.blocks||[]).forEach(b => {
      if(b.type==='notes') return;
      if(catId && b.type!==catId) return;
      const n = (b.name||'').trim();
      if(n) counts[n] = (counts[n]||0) + 1;
    });
  });
  return Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([name,count])=>({name,count}));
}

        document.querySelectorAll('.exercise-history-list').forEach(l=>l.classList.remove('open'));

function toggleExerciseHistory(blockId) {

function filterExerciseHistory(blockId) {

function renderHistoryList(blockId, catId, q='') {

  }

function selectExercise(blockId, name) {
  const input = document.getElementById('name_'+blockId); if(!input) return;

// ── Schedule ──
let weekOffset=0;
function getWeekDates(offset=0) {
  const today=new Date(), day=today.getDay(), mon=new Date(today);
  mon.setDate(today.getDate()-(day===0?6:day-1)+offset*7);
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}
function changeWeek(dir){ weekOffset+=dir; renderSchedule(); }

// Check if a slot is "soon" (within 30 min of now, today only)
function isSoon(dateStr, timeStr) {
  const todayStr = fmtDate(new Date());
  if(dateStr !== todayStr) return false;
  const now = new Date();
  const [h, m] = timeStr.split(':').map(Number);
  const slotMinutes = h * 60 + m;
  const nowMinutes = now.getHours() * 60 + now.getMinutes();
  const diff = slotMinutes - nowMinutes;
  return diff >= 0 && diff <= 30;
}

function renderSchedule() {
  const days=getWeekDates(weekOffset), dayNames=['一','二','三','四','五','六','日'];
  const todayStr=fmtDate(new Date());
  const isCurrentWeek = weekOffset === 0;

  document.getElementById('week-range').textContent=`${days[0].getMonth()+1}/${days[0].getDate()} — ${days[6].getMonth()+1}/${days[6].getDate()}`;

  // Back to today button
  const backWrap = document.getElementById('back-today-wrap');
  backWrap.style.display = weekOffset !== 0 ? 'block' : 'none';

  // Today strip
  const todayStripWrap = document.getElementById('today-strip-wrap');
  if(isCurrentWeek) {
    const todaySlots = data.schedules.filter(s=>s.date===todayStr);
    const total = todaySlots.length;
    const done = todaySlots.filter(s=>s.recorded).length;
    const pending = total - done;
    if(total > 0) {
      todayStripWrap.innerHTML=`<div class="today-strip">
        <span class="today-strip-title">今日</span>
        <div class="today-strip-stats">
          <span class="today-strip-stat"><strong>${total}</strong> 堂課</span>
          <span class="today-strip-stat"><strong>${done}</strong> 已完成</span>
          ${pending>0?`<span class="today-strip-stat"><strong>${pending}</strong> 待上課</span>`:''}
        </div>
      </div>`;
    } else {
      todayStripWrap.innerHTML='';
    }
  } else {
    todayStripWrap.innerHTML='';
  }

  const container=document.getElementById('day-list'); container.innerHTML='';
  days.forEach((d,i)=>{
    const dateStr=fmtDate(d), isToday=dateStr===todayStr;
    const slots=data.schedules.filter(s=>s.date===dateStr).sort((a,b)=>a.time.localeCompare(b.time));
    const block=document.createElement('div');
    block.className='day-block'+(isToday?' today-block':'');
    const header = document.createElement('div');
    header.className=`day-header${isToday?' today':''}`;
    header.innerHTML=`<span>週${dayNames[i]}　${d.getMonth()+1}/${d.getDate()}${isToday?'　今天':''}</span><span style="font-size:11px;font-weight:400;color:var(--accent)">＋</span>`;
    header.addEventListener('click', ()=>openAddScheduleModal(null, dateStr));
    block.appendChild(header);

    if(!slots.length) {
      const empty=document.createElement('div'); empty.className='empty-day'; empty.textContent='無課程'; block.appendChild(empty);
    } else {
      slots.forEach(slot=>{
        const student=data.students.find(s=>s.id===slot.studentId); if(!student) return;
        const el=document.createElement('div');
        const recordedClass = slot.recorded ? ' recorded' : (slot.blocks?.length ? ' has-plan' : '');
        el.className='schedule-slot'+recordedClass;
        const checkedIn = slot.checkedIn;
        const soon = isSoon(slot.date, slot.time);
        const statusText = slot.recorded ? '✓ 已記錄' : (slot.blocks?.length ? '備課完成' : '');
        el.innerHTML=`
          <span class="slot-time">${slot.time}</span>
          ${soon ? '<span class="soon-dot"></span>' : ''}
          <span class="slot-name">${student.name}</span>
          <span class="slot-status">${statusText}</span>
          <button class="checkin-btn ${checkedIn?'checked':''}" data-action="checkin" data-id="${slot.id}" data-checked="${checkedIn}">${checkedIn?'✓ 已簽到':'簽到'}</button>
          <button class="checkin-btn" style="padding:5px 8px" data-action="qr" data-id="${slot.id}" title="QR碼">⬜</button>
          <button class="checkin-btn" style="padding:5px 8px;color:var(--danger);border-color:var(--danger)" data-action="delete" data-id="${slot.id}" title="刪除課程">✕</button>`;
        el.addEventListener('click', e => {
          const btn = e.target.closest('[data-action]');
          if(btn) {
            e.stopPropagation();
            const action = btn.dataset.action, id = btn.dataset.id;
            if(action==='checkin') handleCheckinBtn(id, btn.dataset.checked==='true');
            else if(action==='qr') showQR(id);
            else if(action==='delete') deleteScheduleSlot(id);
            return;
          }
          openLessonModal(slot);
        });
        block.appendChild(el);
      });
    }
    container.appendChild(block);
  });
}

function copyPastSessionToSchedule(si) {
  const sess = window._schedulePastSessions?.[si]; if(!sess) return;

  if(!blocks.length) return;
  clearBuilder('schedule-builder');
  blocks.forEach(b=>addBuilderBlock('schedule-builder', JSON.parse(JSON.stringify(b))));
  showCopyToast(`已複製整堂課（${blocks.length} 個動作）`);
}

function copyScheduleBlockByIndex(si, bi) {
  const sess = window._schedulePastSessions?.[si]; if(!sess) return;
  const blocks = (sess.blocks||[]).filter(b=>b.name||b.type==='notes');
  const block = blocks[bi]; if(!block) return;
  addBuilderBlock('schedule-builder', JSON.parse(JSON.stringify(block)));
  showCopyToast('已複製：' + (block.name||'備注'));

function addSchedule() {
  const studentId=document.getElementById('schedule-student').value;
  const date=document.getElementById('schedule-date').value;
  const time=document.getElementById('schedule-time').value;
  if(!studentId||!date) { showCopyToast('⚠️ 請填寫學生和日期'); return; }
  const repeatTimes = parseInt(document.getElementById('schedule-repeat').value)||0;
  const weeks = 1 + repeatTimes;
  function addWeeks(dateStr, w) {
    const [y,m,d] = dateStr.split('-').map(Number);
    const dt = new Date(y, m-1, d);
    dt.setDate(dt.getDate() + w*7);
    return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
  }
  for(let w=0; w<weeks; w++) {
    data.schedules.push({id:genId(),studentId,date:w===0?date:addWeeks(date,w),time,blocks:[],recorded:false,notes:''});
  }
  save(); closeModal('modal-add-schedule'); renderSchedule();
}

              <span class="past-ref-block-name">${b.name}</span>
              ${chips ? `<span class="past-ref-block-sets">${chips}</span>` : ''}
              <button class="past-ref-copy-btn" onclick="copyBlockByIndex(${si},${bi})">複製</button>
            </div>`;
          }).join('')
        : `<div class="past-ref-empty">無訓練動作</div>`;

      const noteHtml = sess.notes
        ? `<div class="past-ref-session-note">📝 ${sess.notes}</div>` : '';

      return `<div class="past-ref-session">
        <div class="past-ref-session-header" onclick="togglePastSession(this)">
          <span class="past-ref-session-date">${sess.date} ${sess.time}</span>
          <span class="past-ref-session-meta">${actionBlocks.length} 個動作</span>
          <div class="past-ref-session-actions">
            <button class="past-ref-copy-all-btn" onclick="event.stopPropagation();copySessionByIndex(${si})">複製整堂</button>
            <span class="past-ref-toggle-arrow-sm">${isFirst?'▴':'▾'}</span>
          </div>
        </div>
        <div class="past-ref-blocks${isFirst?' open':''}">
          ${blocksHtml}${noteHtml}
        </div>
      </div>`;
    }).join('');

    // 第一筆預設展開面板
    pastBody.classList.add('open');
    document.getElementById('past-ref-arrow').textContent = '▴';
  } else {
    pastRef.style.display = 'none';
  }

  // 從過往課表複製面板
  const copyPanel = document.getElementById('lesson-copy-panel');
  const copyBody  = document.getElementById('lesson-copy-body');
  const copySessions = data.schedules
    .filter(s => s.studentId===slot.studentId && s.id!==slot.id && (s.recorded||(s.blocks&&s.blocks.length)) && (s.date+'T'+s.time)<beforeKey)
    .sort((a,b)=>(b.date+'T'+b.time).localeCompare(a.date+'T'+a.time));
  if(copySessions.length) {
    copyPanel.style.display='block';
    document.getElementById('lesson-copy-count').textContent=`${copySessions.length} 堂`;
    document.getElementById('lesson-copy-arrow').textContent='▾';
    copyBody.classList.remove('open');
    window._lessonCopySessions = copySessions;
    copyBody.innerHTML = copySessions.map((sess,si)=>{
      const actionBlocks=(sess.blocks||[]).filter(b=>b.name||b.type==='notes');
      const bHtml=actionBlocks.length
        ? actionBlocks.map((b,bi)=>`<div class="past-ref-block">
            <span class="past-ref-block-name">${b.name||'備注'}</span>
            <button class="past-ref-copy-btn" onclick="copyLessonBlockByIndex(${si},${bi})">複製</button>
          </div>`).join('')
        : `<div class="past-ref-empty">無訓練內容</div>`;
      return `<div class="past-ref-session">
        <div class="past-ref-session-header" onclick="togglePastSession(this)">
          <span class="past-ref-session-date">${sess.date} ${sess.time}</span>
          <span class="past-ref-session-meta">${sess.recorded?'已完成':'備課'} · ${actionBlocks.length}項</span>
          <div class="past-ref-session-actions">
            <button class="past-ref-copy-all-btn" onclick="event.stopPropagation();copyLessonSessionByIndex(${si})">複製整堂</button>
            <span class="past-ref-toggle-arrow-sm">${si===0?'▴':'▾'}</span>
          </div>
        </div>
        <div class="past-ref-blocks${si===0?' open':''}">${bHtml}</div>
      </div>`;
    }).join('');
  } else {
    copyPanel.style.display='none';
  }

  clearBuilder('lesson-builder');
  const firstCatId = getCategories()[0]?.id || 'notes';
  const blocks = slot.blocks?.length ? slot.blocks : [{type:firstCatId,name:'',sets:[{sets:'',reps:'',weight:''}],exerciseNote:''}];
  blocks.forEach(b => addBuilderBlock('lesson-builder', b));
  document.getElementById('lesson-notes').value = slot.notes || '';
  openModal('modal-lesson-record');
}

function cancelLessonRecord() {
  appConfirm('確定取消這堂課的登入？堂數會退回，訓練內容保留。', () => {
    const slot=data.schedules.find(s=>s.id===currentLessonId); if(!slot) return;
    slot.recorded=false;
    if(slot.sessionDeducted) {
      const student=data.students.find(s=>s.id===slot.studentId);
      if(student) { student.remainingSessions++; student.completedSessions=Math.max(0,(student.completedSessions||1)-1); }
      slot.sessionDeducted=false;
    }
    save(); closeModal('modal-lesson-record'); renderSchedule();
  });
}

function saveLessonRecord() {
  const slot=data.schedules.find(s=>s.id===currentLessonId); if(!slot) return;
  slot.blocks=getBuilderBlocks('lesson-builder');
  slot.notes=document.getElementById('lesson-notes').value.trim();
  slot.recorded=true;
  slot.checkedIn=true;
  if(!slot.checkinTime) slot.checkinTime=new Date().toISOString();
  if(!slot.sessionDeducted) {
    const student=data.students.find(s=>s.id===slot.studentId);
    if(student&&student.remainingSessions>0) { student.remainingSessions--; student.completedSessions=(student.completedSessions||0)+1; slot.sessionDeducted=true; }
  }
  save(); closeModal('modal-lesson-record'); renderSchedule();
}

function getNextLesson(studentId) {
  const today = fmtDate(new Date());
  return data.schedules
    .filter(s=>s.studentId===studentId && !s.recorded && s.date>=today)
    .sort((a,b)=>a.date.localeCompare(b.date)||(a.time.localeCompare(b.time)))[0] || null;
}

function renderStudents() {
  const q=document.getElementById('student-search').value.toLowerCase();
  const grid=document.getElementById('student-grid');
  const filtered=data.students.filter(s=>s.name.toLowerCase().includes(q));
  if(!filtered.length) {
    grid.innerHTML=`<div class="no-data" style="grid-column:1/-1"><div class="icon">👤</div><div>${q?'找不到學生':'尚未新增學生，點擊 ＋ 開始'}</div></div>`; return;
  }
  grid.innerHTML=filtered.map(s=>{
    const threshold = s.threshold||3;
    const warn=s.remainingSessions<=threshold&&s.remainingSessions>0, danger=s.remainingSessions===0;
    const totalPaid=s.payments.reduce((sum,p)=>sum+(p.amount||0),0);
    const totalBought=s.payments.reduce((sum,p)=>sum+p.sessions,0);
    const avg=totalBought?Math.round(totalPaid/totalBought):0;
    const nextLesson = getNextLesson(s.id);
    const nextStr = nextLesson
      ? `<div class="student-next-lesson"><span class="next-icon">▸</span> 下次 ${nextLesson.date.slice(5).replace('-','/')} ${nextLesson.time}</div>`
      : `<div class="student-next-lesson" style="color:var(--text3)"><span class="next-icon">—</span> 尚無排課</div>`;
    return `<div class="student-card ${danger?'danger':warn?'warning':''}" onclick="openStudentDetail('${s.id}')">
      <div class="student-name">${s.name}</div>
      <div class="student-meta">
        <span class="badge ${danger?'danger':warn?'warning':'accent'}">${s.remainingSessions} 堂剩餘</span>
        <span class="badge">${s.completedSessions||0} 堂完成</span>
        ${avg?`<span class="badge teal">$${avg.toLocaleString()}/堂</span>`:''}
        ${danger?'<span class="badge danger">需續費</span>':''}
        ${warn&&!danger?'<span class="badge warning">快用完</span>':''}
      </div>
      ${nextStr}
    </div>`;
  }).join('');
}

function openStudentDetail(id) {
  const s=data.students.find(st=>st.id===id); if(!s) return;
  const nameEl = document.getElementById('detail-student-name');
  nameEl.value = s.name;
  nameEl.dataset.studentId = id;
  const lessons=data.schedules.filter(sl=>sl.studentId===id&&sl.recorded).sort((a,b)=>b.date.localeCompare(a.date));
  const totalPaid=s.payments.reduce((sum,p)=>sum+(p.amount||0),0);
  const totalBought=s.payments.reduce((sum,p)=>sum+p.sessions,0);
  const avg=totalBought?Math.round(totalPaid/totalBought):0;
  const measures=(s.measurements||[]).slice().sort((a,b)=>b.date.localeCompare(a.date));

  // 最新一筆測量
  const latestM = measures[0];
  const latestMStr = latestM ? `體重 ${latestM.weight||'—'} kg${latestM.bodyFat?` · 體脂 ${latestM.bodyFat}%`:''}` : '';

  // 測量表格
  const measureTableRows = measures.map((m, i) => {
    const prev = measures[i+1];
    function delta(cur, prv, unit='') {
      if(!cur||!prv) return '';
      const d = (parseFloat(cur)-parseFloat(prv)).toFixed(1);
      if(d==0) return '';
      const cls = parseFloat(d)>0 ? 'up' : 'down';
      return `<span class="measure-delta ${cls}">${parseFloat(d)>0?'▲':'▼'}${Math.abs(d)}${unit}</span>`;
    }
    return `<tr>
      <td>${m.date}</td>
      <td>${m.weight?`<span class="measure-val">${m.weight}</span>${delta(m.weight,prev?.weight,'')}`:'—'}</td>
      <td>${m.bodyFat?`<span class="measure-val">${m.bodyFat}</span>${delta(m.bodyFat,prev?.bodyFat,'')}`:'—'}</td>
      <td>${m.muscle?`<span class="measure-val">${m.muscle}</span>${delta(m.muscle,prev?.muscle,'')}`:'—'}</td>
      <td>${m.waist?`<span class="measure-val">${m.waist}</span>`:'—'}</td>
      <td class="measure-note-cell" title="${m.note||''}">${m.note||''}</td>
      <td><button class="measure-del-btn" onclick="deleteMeasurement('${id}','${m.id}')">×</button></td>
    </tr>`;
  }).join('');

  document.getElementById('detail-content').innerHTML=`
    <div class="detail-stats">
      <div class="stat-box"><div class="stat-value">${s.remainingSessions}</div><div class="stat-label">剩餘堂數</div></div>
      <div class="stat-box"><div class="stat-value">${s.completedSessions||0}</div><div class="stat-label">已完成</div></div>
      <div class="stat-box"><div class="stat-value">$${totalPaid.toLocaleString()}</div><div class="stat-label">總付款</div></div>
    </div>
    ${avg?`<div style="text-align:center;margin-top:-6px;margin-bottom:14px;font-size:12px;color:var(--text2)">平均單堂 <span style="color:var(--accent2);font-family:'DM Mono',monospace">$${avg.toLocaleString()}</span> 元</div>`:''}
    <div class="btn-group" style="margin-bottom:16px">
      <button class="btn btn-primary btn-sm" onclick="openAddPaymentModal('${id}')">＋ 續費</button>
      <button class="btn btn-secondary btn-sm" onclick="openAddScheduleForStudent('${id}')">＋ 排課</button>
      <button class="btn btn-secondary btn-sm" onclick="openMeasurementModal('${id}')">📏 記錄測量</button>
      <button class="btn btn-danger btn-sm" onclick="deleteStudent('${id}')">刪除學生</button>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:10px 12px;background:var(--surface2);border-radius:8px">
      <span style="font-size:12px;color:var(--text2);flex:1">續費提醒門檻</span>
      <input type="number" min="1" value="${s.threshold||3}"
        style="width:52px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-family:'DM Mono',monospace;font-size:13px;text-align:center;outline:none;color:var(--text)"
        onchange="updateThreshold('${id}',this.value)">
      <span style="font-size:12px;color:var(--text3)">堂</span>
    </div>
    <hr class="divider">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div style="font-size:13px;font-weight:600;color:var(--text2)">📏 身體測量（${measures.length} 筆）</div>
      <button class="btn btn-secondary btn-sm" onclick="openMeasurementModal('${id}')">＋ 新增</button>
    </div>
    ${latestM ? `<div style="font-size:12px;color:var(--text2);margin-bottom:8px;padding:8px 12px;background:rgba(45,74,62,0.05);border-radius:7px">最新：${latestMStr}　<span style="color:var(--text3)">${latestM.date}</span></div>` : ''}
    ${measures.length ? `
    <div style="overflow-x:auto;margin-bottom:4px">
      <table class="measure-table">
        <thead><tr>
          <th>日期</th><th>體重 kg</th><th>體脂 %</th><th>骨骼肌 kg</th><th>腰圍 cm</th><th>備注</th><th></th>
        </tr></thead>
        <tbody>${measureTableRows}</tbody>
      </table>
    </div>` : '<div style="color:var(--text3);font-size:13px;padding:6px 0 12px">尚無測量記錄</div>'}
    <hr class="divider">
    <div style="font-size:13px;font-weight:600;margin-bottom:10px;color:var(--text2)">上課記錄（${lessons.length} 堂）</div>
    ${!lessons.length?'<div style="color:var(--text3);font-size:13px;padding:8px 0">尚無上課記錄</div>':`<div class="lesson-list">${lessons.map(l=>`
      <div class="lesson-item">
        <div class="lesson-date">${l.date}　${l.time}</div>
        ${renderBlocksDisplay(l.blocks)}
        ${l.notes?`<div style="font-size:11px;color:var(--text3);margin-top:4px;font-style:italic">${l.notes}</div>`:''}
      </div>`).join('')}</div>`}
    <hr class="divider">
    <div style="font-size:13px;font-weight:600;margin-bottom:10px;color:var(--text2)">付款記錄</div>
    ${s.payments.map(p=>{
      const ps=p.sessions&&p.amount?Math.round(p.amount/p.sessions):0;
      return `<div class="payment-item"><div><div>${p.sessions} 堂</div><div class="payment-date">${p.date}</div>${ps?`<div class="per-session">$${ps.toLocaleString()}/堂</div>`:''}</div><div class="payment-amount">$${(p.amount||0).toLocaleString()}</div></div>`;
    }).join('')}`;
  openModal('modal-student-detail');
}
