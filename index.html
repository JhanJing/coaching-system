// Compute earned revenue for a given YYYY-MM month
function getMonthEarned(month) {
  let earned = 0;
  data.schedules.filter(s=>s.recorded&&s.checkedIn&&s.date.slice(0,7)===month).forEach(slot=>{
    const student=data.students.find(s=>s.id===slot.studentId); if(!student) return;
    const totalPaid=student.payments.reduce((sum,p)=>sum+(p.amount||0),0);
    const totalBought=student.payments.reduce((sum,p)=>sum+p.sessions,0);
    earned += totalBought ? Math.round(totalPaid/totalBought) : 0;
  });
  return earned;
}

function getLast6Months() {
  const months = [];
  const now = new Date();
  for(let i=5; i>=0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    months.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
  }
  return months;
}

let chartMonths = [];
function drawRevenueChart(months, earned, selectedMonth) {
  const canvas = document.getElementById('revenue-chart');
  if(!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.offsetWidth || canvas.parentElement.offsetWidth;
  const h = 80;
  canvas.width = w * dpr; canvas.height = h * dpr;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const max = Math.max(...earned, 1);
  const barW = Math.floor((w - 32) / months.length) - 6;
  const gap = 6;
  const startX = 16;
  const bottomY = h - 20;
  const maxBarH = bottomY - 6;

  ctx.clearRect(0, 0, w, h);

  months.forEach((m, i) => {
    const x = startX + i * (barW + gap);
    const barH = Math.max(3, Math.round((earned[i] / max) * maxBarH));
    const y = bottomY - barH;
    const isSelected = m === selectedMonth;
    ctx.fillStyle = isSelected ? '#2d4a3e' : 'rgba(122,158,142,0.35)';
    ctx.beginPath();
    ctx.roundRect(x, y, barW, barH, 3);
    ctx.fill();

    // Month label
    ctx.fillStyle = isSelected ? '#2d4a3e' : '#b5b0a8';
    ctx.font = `${isSelected?'600':'400'} 10px Inter, sans-serif`;
    ctx.textAlign = 'center';
    const label = m.slice(5) + '月';
    ctx.fillText(label, x + barW/2, h - 4);

    // Amount label above bar (only if has value)
    if(earned[i] > 0) {
      ctx.fillStyle = isSelected ? '#2d4a3e' : '#7a7670';
      ctx.font = '9px DM Mono, monospace';
      const amtLabel = earned[i] >= 10000 ? (earned[i]/1000).toFixed(0)+'k' : earned[i].toLocaleString();
      ctx.fillText(amtLabel, x + barW/2, y - 2);
    }
  });
  chartMonths = months;
}

canvas_click_handler = function(e) {
  const canvas = document.getElementById('revenue-chart'); if(!canvas||!chartMonths.length) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const w = canvas.offsetWidth;
  const barW = Math.floor((w - 32) / chartMonths.length) - 6;
  const gap = 6;
  const startX = 16;
  chartMonths.forEach((m, i) => {
    const bx = startX + i * (barW + gap);
    if(x >= bx && x <= bx + barW) { selectMonth(m); }
  });
};

// ── Monthly Revenue ──
let selectedMonth=null;
function getAvailableMonths() {
  const months=new Set();
  data.schedules.filter(s=>s.recorded&&s.checkedIn).forEach(s=>months.add(s.date.slice(0,7)));
  data.students.forEach(s=>s.payments.forEach(p=>months.add(p.date.slice(0,7))));
  return [...months].sort().reverse();
}

function renderHistory() {
  // 更新學生篩選下拉
  const sel = document.getElementById('history-filter-student');
  const prevVal = sel.value;
  sel.innerHTML = '<option value="">全部學生</option>' +
    data.students.map(s=>`<option value="${s.id}"${s.id===prevVal?' selected':''}>${s.name}</option>`).join('');

  const filterStudentId = sel.value;
  const recorded = data.schedules
    .filter(s => s.recorded && (!filterStudentId || s.studentId === filterStudentId))
    .sort((a,b) => (b.date+'T'+b.time).localeCompare(a.date+'T'+a.time));

  document.getElementById('history-count').textContent = `共 ${recorded.length} 堂`;

  const list = document.getElementById('history-list');
  if(!recorded.length) {
    list.innerHTML = `<div class="no-history"><div class="icon">📋</div><div>${filterStudentId?'此學生尚無訓練記錄':'尚無任何訓練記錄'}</div></div>`;
    return;
  }

  list.innerHTML = recorded.map(slot => {
    const student = data.students.find(s=>s.id===slot.studentId);
    const name = student ? student.name : '未知學生';
    const notesHtml = slot.notes ? `<div class="history-card-notes">${slot.notes}</div>` : '';
    return `<div class="history-card">
      <div class="history-card-header">
        <span class="history-card-date">${slot.date}</span>
        <span class="history-card-time">${slot.time}</span>
        <span class="history-card-student">${name}</span>
      </div>
      ${renderBlocksDisplay(slot.blocks)}
      ${notesHtml}
    </div>`;
  }).join('');
}

function renderPayments() {
  const months=getAvailableMonths();
  const currentYear = new Date().getFullYear().toString();

  // YTD stats
  const ytdMonths = [...new Set([
    ...data.schedules.filter(s=>s.recorded&&s.checkedIn&&s.date.startsWith(currentYear)).map(s=>s.date.slice(0,7)),
    ...data.students.flatMap(s=>s.payments.filter(p=>p.date.startsWith(currentYear)).map(()=>'')).filter(Boolean)
  ])];
  let ytdLessons=0, ytdEarned=0;
  data.schedules.filter(s=>s.recorded&&s.checkedIn&&s.date.startsWith(currentYear)).forEach(slot=>{
    ytdLessons++;
    const student=data.students.find(s=>s.id===slot.studentId); if(!student) return;
    const totalPaid=student.payments.reduce((sum,p)=>sum+(p.amount||0),0);
    const totalBought=student.payments.reduce((sum,p)=>sum+p.sessions,0);
    ytdEarned += totalBought ? Math.round(totalPaid/totalBought) : 0;
  });
  const activeMonthsCount = new Set(data.schedules.filter(s=>s.recorded&&s.checkedIn&&s.date.startsWith(currentYear)).map(s=>s.date.slice(0,7))).size;
  const monthAvg = activeMonthsCount ? Math.round(ytdEarned/activeMonthsCount) : 0;

  const ytdExpense = (data.expenses||[]).filter(e=>e.date.startsWith(currentYear)).reduce((sum,e)=>sum+(e.amount||0),0);
  const ytdNet = ytdEarned - ytdExpense;

  document.getElementById('ytd-strip').innerHTML = `
    <div class="ytd-strip" style="margin-bottom:12px">
      <div class="ytd-box"><div class="ytd-val">${ytdLessons}</div><div class="ytd-label">本年堂數</div></div>
      <div class="ytd-box"><div class="ytd-val" style="color:var(--accent2)">$${ytdEarned.toLocaleString()}</div><div class="ytd-label">本年收入</div></div>
      <div class="ytd-box"><div class="ytd-val" style="color:var(--danger)">$${ytdExpense.toLocaleString()}</div><div class="ytd-label">本年支出</div></div>
    </div>
    <div class="net-profit-row ${ytdNet>=0?'positive':'negative'}" style="margin-bottom:14px">
      <span class="net-profit-label">本年淨利</span>
      <span class="net-profit-val" style="color:${ytdNet>=0?'var(--accent)':'var(--danger)'}">
        ${ytdNet>=0?'':'-'}$${Math.abs(ytdNet).toLocaleString()}
      </span>
    </div>`;

  // 6-month chart
  const last6 = getLast6Months();
  const earned6 = last6.map(m=>getMonthEarned(m));
  const chartWrap = document.getElementById('chart-wrap');
  if(earned6.some(v=>v>0)) {
    chartWrap.style.display='block';
    const canvas = document.getElementById('revenue-chart');
    canvas.onclick = canvas_click_handler;
    setTimeout(()=>drawRevenueChart(last6, earned6, selectedMonth||months[0]), 50);
  } else {
    chartWrap.style.display='none';
  }

  if(!months.length) {
    document.getElementById('month-tabs').innerHTML='';
    document.getElementById('monthly-stats').innerHTML='<div class="no-data"><div class="icon">📊</div><div>尚無資料，先完成上課記錄</div></div>';
    document.getElementById('payment-list-all').innerHTML=''; return;
  }
  if(!selectedMonth||!months.includes(selectedMonth)) selectedMonth=months[0];
  document.getElementById('month-tabs').innerHTML=months.map(m=>
    `<button class="month-tab ${m===selectedMonth?'active':''}" onclick="selectMonth('${m}')">${m.replace('-','年')}月</button>`
  ).join('');
  renderMonthStats(selectedMonth);
  renderAllPayments();
}

function selectMonth(m) {
  selectedMonth=m;
  document.querySelectorAll('.month-tab').forEach(el=>el.classList.toggle('active',el.textContent===m.replace('-','年')+'月'));
  renderMonthStats(m);
  // Redraw chart with new selection
  const last6 = getLast6Months();
  const earned6 = last6.map(mo=>getMonthEarned(mo));
  if(earned6.some(v=>v>0)) drawRevenueChart(last6, earned6, m);
}

function renderMonthStats(month) {
  const lessonsThisMonth=data.schedules.filter(s=>s.recorded&&s.checkedIn&&s.date.slice(0,7)===month);
  const lessonCount=lessonsThisMonth.length;
  let earnedRevenue=0;
  const studentBreakdown={};
  lessonsThisMonth.forEach(slot=>{
    const student=data.students.find(s=>s.id===slot.studentId); if(!student) return;
    const totalPaid=student.payments.reduce((sum,p)=>sum+(p.amount||0),0);
    const totalBought=student.payments.reduce((sum,p)=>sum+p.sessions,0);
    const perSession=totalBought?Math.round(totalPaid/totalBought):0;
    earnedRevenue+=perSession;
    if(!studentBreakdown[student.id]) studentBreakdown[student.id]={name:student.name,count:0,revenue:0,perSession};
    studentBreakdown[student.id].count++;
    studentBreakdown[student.id].revenue+=perSession;
  });
  let receivedRevenue=0;
  data.students.forEach(s=>s.payments.forEach(p=>{ if(p.date.slice(0,7)===month) receivedRevenue+=(p.amount||0); }));

  // Expenses this month
  const monthExpenses = (data.expenses||[]).filter(e=>e.date.slice(0,7)===month);
  const totalExpense = monthExpenses.reduce((sum,e)=>sum+(e.amount||0),0);
  const netProfit = earnedRevenue - totalExpense;

  const breakdown=Object.values(studentBreakdown).sort((a,b)=>b.count-a.count);
  document.getElementById('monthly-stats').innerHTML=`
    <div class="monthly-grid">
      <div class="stat-box"><div class="stat-value">${lessonCount}</div><div class="stat-label">完成堂數</div></div>
      <div class="stat-box"><div class="stat-value" style="color:var(--accent2)">$${earnedRevenue.toLocaleString()}</div><div class="stat-label">課堂收入</div></div>
      <div class="stat-box"><div class="stat-value" style="color:var(--warning)">$${receivedRevenue.toLocaleString()}</div><div class="stat-label">收款金額</div></div>
    </div>
    ${breakdown.length?`
      <div style="font-size:12px;color:var(--text2);margin-bottom:8px;font-weight:600">學生明細</div>
      <div class="monthly-breakdown">${breakdown.map(b=>`
        <div class="breakdown-row">
          <span>${b.name}</span>
          <span style="display:flex;gap:12px;align-items:center">
            <span style="color:var(--text2);font-size:12px">${b.count} 堂</span>
            <span style="color:var(--text3);font-size:11px">$${b.perSession.toLocaleString()}/堂</span>
            <span class="breakdown-val">$${b.revenue.toLocaleString()}</span>
          </span>
        </div>`).join('')}
      </div>`:''}
    <hr style="border:none;border-top:1px solid var(--border);margin:12px 0">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="font-size:12px;color:var(--text2);font-weight:600">支出明細</div>
      <button onclick="openExpenseModal('${month}')" style="background:none;border:none;font-size:11px;color:var(--accent2);cursor:pointer;font-family:inherit">＋ 新增</button>
    </div>
    ${monthExpenses.length ? `<div class="monthly-breakdown">
      ${monthExpenses.map(e=>`
        <div class="expense-item">
          <div>
            <span class="expense-cat">${EXPENSE_CAT_LABELS[e.cat]||e.cat}</span>
            ${e.note?`<span style="font-size:12px;color:var(--text2);margin-left:6px">${e.note}</span>`:''}
            <div class="payment-date">${e.date}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="expense-amount">-$${e.amount.toLocaleString()}</span>
            <button onclick="deleteExpense('${e.id}')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px">×</button>
          </div>
        </div>`).join('')}
    </div>` : `<div style="font-size:12px;color:var(--text3);padding:6px 0">本月無支出記錄</div>`}
    <div class="net-profit-row ${netProfit>=0?'positive':'negative'}">
      <span class="net-profit-label">本月淨利（收入 − 支出）</span>
      <span class="net-profit-val" style="color:${netProfit>=0?'var(--accent)':'var(--danger)'}">
        ${netProfit>=0?'':'-'}$${Math.abs(netProfit).toLocaleString()}
      </span>
    </div>`;
}

function renderAllPayments() {
  const all=[];
  data.students.forEach(s=>s.payments.forEach(p=>{
    const ps=p.sessions&&p.amount?Math.round(p.amount/p.sessions):0;
    all.push({...p,studentName:s.name,ps});
  }));
  all.sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('payment-list-all').innerHTML=!all.length
    ?'<div class="no-data"><div class="icon">💳</div><div>尚無付款記錄</div></div>'
    :all.map(p=>`<div class="payment-item"><div><div style="font-weight:500">${p.studentName}</div><div class="payment-date">${p.date}　${p.sessions} 堂${p.ps?`　·　$${p.ps.toLocaleString()}/堂`:''}</div></div><div class="payment-amount">$${(p.amount||0).toLocaleString()}</div></div>`).join('');
}

// ── Check-in ──
function deleteScheduleSlot(slotId) {
  const slot = data.schedules.find(s=>s.id===slotId); if(!slot) return;
  const msg = slot.recorded ? '學生取消課程？此堂記錄將刪除，堂數退回。' : '確定刪除此課程？';
  appConfirm(msg, () => {
    if(slot.sessionDeducted) {
      const student = data.students.find(s=>s.id===slot.studentId);
      if(student) { student.remainingSessions++; student.completedSessions=Math.max(0,(student.completedSessions||1)-1); }
    }
    data.schedules = data.schedules.filter(s=>s.id!==slotId);
    save(); renderSchedule();
  });
}
function handleCheckinBtn(slotId, isCheckedIn) {
  if(isCheckedIn) appConfirm('確定取消此學生的簽到？', ()=>toggleCheckin(slotId));
  else toggleCheckin(slotId);
}
function toggleCheckin(slotId) {
  const slot = data.schedules.find(s=>s.id===slotId); if(!slot) return;
  slot.checkedIn = !slot.checkedIn;
  if(slot.checkedIn) slot.checkinTime = new Date().toISOString();
  else delete slot.checkinTime;
  save(); renderSchedule();
}

let currentQRSlotId = null;
function showQR(slotId) {
  const slot = data.schedules.find(s=>s.id===slotId); if(!slot) return;
  const student = data.students.find(s=>s.id===slot.studentId); if(!student) return;
  currentQRSlotId = slotId;
  const url = location.href.split('#')[0] + '#checkin/' + slotId;
  document.getElementById('qr-title').textContent = student.name + ' — ' + slot.date + ' ' + slot.time;
  document.getElementById('qr-link-text').textContent = url;
  document.getElementById('qr-link-text').href = url;
  drawQRCode('qr-canvas', url);
  openModal('modal-qr');
}

function drawQRCode(canvasId, text) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  const size = 200;
  canvas.width = canvas.height = size;
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,size,size);
  const script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
  script.onload = () => {
    const tmp = document.createElement('div'); tmp.style.display='none'; document.body.appendChild(tmp);
    new QRCode(tmp, {text,width:200,height:200,colorDark:'#000000',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
    setTimeout(()=>{
      const img = tmp.querySelector('img')||tmp.querySelector('canvas');
      if(img) { ctx.clearRect(0,0,size,size); ctx.drawImage(img,0,0,size,size); }
      document.body.removeChild(tmp);
    }, 200);
  };
  script.onerror = () => {
    ctx.fillStyle='#1a1a1a'; ctx.fillRect(0,0,size,size);
    ctx.fillStyle='#c8f55a'; ctx.font='bold 14px sans-serif'; ctx.textAlign='center';
    ctx.fillText('請複製下方連結', size/2, 90);
    ctx.fillStyle='#888'; ctx.font='11px sans-serif';
    ctx.fillText('傳送給學生簽到', size/2, 115);
  };
  if(!window.QRCode) document.head.appendChild(script);
  else script.onload();
}

function copyCheckinLink() {
  const link = document.getElementById('qr-link-text').textContent;
  navigator.clipboard?.writeText(link).then(()=>showCopyToast('連結已複製！')).catch(()=>showCopyToast('請手動複製連結'));
}

// ── URL Hash Check-in ──
function handleHashCheckin() {
  const hash = location.hash;
  if(!hash.startsWith('#checkin/')) return false;
  const slotId = hash.slice(9);
  const slot = data.schedules.find(s=>s.id===slotId);
  if(!slot) { showCheckinPage('找不到課程，請聯絡教練', false); return true; }
  const student = data.students.find(s=>s.id===slot.studentId);
  const name = student?.name || '學生';
  if(slot.checkedIn) { showCheckinPage(`${name}，你已經簽到了！\n${slot.date} ${slot.time}`, true); return true; }
  slot.checkedIn = true; slot.checkinTime = new Date().toISOString(); save();
  showCheckinPage(`簽到成功！\n${name}\n${slot.date} ${slot.time}`, true);
  return true;
}

function showCheckinPage(msg, success) {
  document.body.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0f0f0f;font-family:'Noto Sans TC',sans-serif;padding:20px;">
      <div style="text-align:center;padding:40px 32px;background:#1a1a1a;border-radius:20px;border:2px solid ${success?'#c8f55a':'#f55a5a'};max-width:320px;width:100%">
        <div style="font-size:56px;margin-bottom:16px">${success?'✅':'❌'}</div>
        <div style="font-size:18px;font-weight:700;color:${success?'#c8f55a':'#f55a5a'};white-space:pre-line;line-height:1.8">${msg}</div>
        <div style="margin-top:20px;font-size:13px;color:#888">可以關閉此頁面</div>
      </div>
    </div>`;
}

// ── Colour picker init ──
function initColorPicker() {
  const row = document.getElementById('color-picker'); if(!row) return;
  const colors = {green:'#c8f55a',yellow:'#f5c85a',blue:'#7ab0ff',purple:'#c07aff',orange:'#ffa03c',pink:'#ff7ac8',red:'#f55a5a',cyan:'#5af5c8'};
  let selected = 'green';
  row.innerHTML = Object.entries(colors).map(([k,v])=>
    `<div class="color-swatch${k===selected?' selected':''}" style="background:${v}" data-color="${k}" onclick="selectColor('${k}')"></div>`
  ).join('');
}
function selectColor(color) {
  document.getElementById('new-cat-color').value = color;
  document.querySelectorAll('.color-swatch').forEach(el=>el.classList.toggle('selected', el.dataset.color===color));
}
